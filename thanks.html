<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent | Bethania Academy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .thanks-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; }
        .icon-check { color: #2e7d32; font-size: 4rem; margin-bottom: 20px; }
        h1 { color: #1a252f; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; line-height: 1.6; }
        .back-btn { background: #2e7d32; color: white; text-decoration: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .back-btn:hover { background: #1b5e20; }
    </style>
</head>
<body>
    <div class="thanks-box">
        <i class="fas fa-check-circle icon-check"></i>
        <h1>Thank You!</h1>
        <p>Your feedback has been successfully sent to the school administration. We appreciate your contribution to our community.</p>
        <a href="index.html" class="back-btn">RETURN TO HOME</a>
    </div>
</body>
</html>
