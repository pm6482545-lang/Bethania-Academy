<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resources Explorer | Bethania Academy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .file-list-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 20px; }
        .file-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; text-decoration: none; color: #333; transition: 0.2s; }
        .file-item:hover { background: #f0f7ff; color: #1976d2; }
        .file-item i { margin-right: 15px; font-size: 1.2rem; color: #d32f2f; }
        .back-link { display: inline-block; margin-top: 20px; color: #1976d2; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="top-header"> <h1 id="folder-title">Loading Repository...</h1> </div>
    <div class="about-container">
        <div class="file-list-container">
            <h2 id="grade-heading" style="color: #1976d2; margin-bottom: 20px;">Scanning Folder...</h2>
            <div id="file-list-display"><p><i class="fas fa-spinner fa-spin"></i> Searching for files...</p></div>
            <a href="library.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Library</a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const grade = params.get('grade') || 'PP1';
        document.getElementById('folder-title').innerText = grade + " Repository";
        document.getElementById('grade-heading').innerText = "Documents in " + grade;

        async function autoLoadFiles() {
            const display = document.getElementById('file-list-display');
            const folderPath = `documents/${grade}/`;

            try {
                // We fetch the folder URL. GitHub/Netlify will return an HTML list of files.
                const response = await fetch(folderPath);
                if (!response.ok) throw new Error("Folder not found");
                
                const htmlText = await response.text();
                
                // We use a temporary element to parse the HTML string
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = htmlText;
                
                // Find all links (<a> tags) in that HTML
                const links = tempDiv.querySelectorAll('a');
                let fileFound = false;
                display.innerHTML = ""; // Clear the loading text

                links.forEach(link => {
                    const href = link.getAttribute('href');
                    // We only want files, so we ignore links like "../" or index files
                    if (href && href.includes('.') && !href.startsWith('..') && !href.toLowerCase().includes('index')) {
                        fileFound = true;
                        const fileName = decodeURIComponent(href).split('/').pop();
                        const icon = fileName.endsWith('.pdf') ? 'fa-file-pdf' : 'fa-file-alt';
                        
                        display.innerHTML += `
                            <a href="${folderPath}${href}" class="file-item" target="_blank">
                                <i class="fas ${icon}"></i>
                                <span>${fileName}</span>
                            </a>`;
                    }
                });

                if (!fileFound) {
                    display.innerHTML = "<p>No documents found in this folder yet.</p>";
                }

            } catch (error) {
                console.error(error);
                display.innerHTML = "<p>Folder is ready! Start uploading files to see them here.</p>";
            }
        }

        autoLoadFiles();
    </script>
</body>
</html>
