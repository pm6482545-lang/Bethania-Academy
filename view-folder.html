<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resources Explorer | Bethania Academy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .file-list-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 20px; }
        .file-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; text-decoration: none; color: #333; transition: 0.2s; }
        .file-item:hover { background: #f0f7ff; color: #1976d2; }
        .file-item i { margin-right: 15px; font-size: 1.2rem; color: #d32f2f; }
        .back-link { display: inline-block; margin-top: 20px; color: #1976d2; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="top-header"> <h1 id="folder-title">Resource Repository</h1> </div>
    <div class="about-container">
        <div class="file-list-container">
            <h2 id="grade-heading" style="color: #1976d2; margin-bottom: 20px;">Scanning Folder...</h2>
            <div id="file-list-display">
                <p><i class="fas fa-spinner fa-spin"></i> Reading folder content...</p>
            </div>
            <a href="library.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Library</a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const grade = params.get('grade') || 'PP1';
        
        document.getElementById('folder-title').innerText = grade + " Repository";
        document.getElementById('grade-heading').innerText = "Files in " + grade;

        async function scanGitHubFolder() {
            const display = document.getElementById('file-list-display');
            // The exact path where your files are stored
            const folderPath = `documents/${grade}/`;

            try {
                const response = await fetch(folderPath);
                const text = await response.text();
                
                // We parse the HTML of the folder directory
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');
                const links = Array.from(doc.querySelectorAll('a'));
                
                display.innerHTML = ""; // Clear loading message
                let fileCount = 0;

                links.forEach(link => {
                    const fileName = link.getAttribute('href');
                    
                    // Filter: Only show files, ignore parent folders and system files
                    if (fileName && fileName.includes('.') && !fileName.startsWith('..') && !fileName.includes('index')) {
                        fileCount++;
                        // Set icon based on extension
                        let iconClass = "fa-file-alt";
                        if (fileName.toLowerCase().endsWith('.pdf')) iconClass = "fa-file-pdf";
                        if (fileName.toLowerCase().endsWith('.txt')) iconClass = "fa-file-code";

                        display.innerHTML += `
                            <a href="${folderPath}${fileName}" class="file-item" target="_blank">
                                <i class="fas ${iconClass}"></i>
                                <span>${decodeURIComponent(fileName)}</span>
                            </a>`;
                    }
                });

                if (fileCount === 0) {
                    display.innerHTML = "<p>No files found. Upload documents to this folder on GitHub to see them here automatically.</p>";
                }

            } catch (error) {
                display.innerHTML = "<p>Folder is ready. Please upload your files to the repository.</p>";
            }
        }

        scanGitHubFolder();
    </script>
</body>
</html>
